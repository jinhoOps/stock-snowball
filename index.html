<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="description" content="매일의 작은 투자가 거대한 자산의 눈덩이로 성장할 수 있도록 돕는 자동 매수 계산기" />

    <!-- PWA: Theme Color (삼성 인터넷 & 사파리 & 크롬 공통) -->

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Snowball" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA: Android / Samsung Internet -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Snowball" />

    <title>Stock Snowball - 매일의 작은 투자가 만드는 눈덩이</title>
  </head>

    <div id="root"></div>
