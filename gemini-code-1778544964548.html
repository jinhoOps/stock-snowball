<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 자동 매수 확장 계산기</title>
<style>
  :root {
    --primary: #0066cc;
    --canvas: #ffffff;
    --canvas-parchment: #f5f5f7;
    --ink: #1d1d1f;
    --ink-muted-48: #7a7a7a;
    --hairline: #e0e0e0;
    --divider-soft: #f0f0f0;
  }

  body {
    background-color: var(--canvas-parchment);
    color: var(--ink);
    font-family: "SF Pro Text", system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    margin: 0;
    padding: 40px 20px;
    box-sizing: border-box;
  }

  .main-card {
    background-color: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: 18px;
    padding: 32px;
    width: 100%;
    max-width: 480px;
    box-sizing: border-box;
  }

  .headline {
    font-family: "SF Pro Display", system-ui, -apple-system, sans-serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.28px;
    margin: 0 0 32px 0;
    text-align: center;
  }

  .input-section {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 32px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .label {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-muted-48);
  }

  .row-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .search-input {
    width: 100%;
    box-sizing: border-box;
    background-color: var(--canvas-parchment);
    color: var(--ink);
    font-size: 17px;
    border: none;
    border-radius: 12px;
    padding: 14px 20px;
    outline: none;
    text-align: right;
  }

  .search-input:focus {
    box-shadow: 0 0 0 2px var(--primary);
  }

  .switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 26px;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: var(--hairline);
    border-radius: 9999px;
    transition: 0.3s;
  }

  .slider:before {
    position: absolute;
    content: "";
    height: 20px;
    width: 20px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    border-radius: 9999px;
    transition: 0.3s;
  }

  input:checked + .slider {
    background-color: var(--primary);
  }

  input:checked + .slider:before {
    transform: translateX(24px);
  }

  .results-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }

  .results-table th {
    text-align: left;
    font-size: 14px;
    color: var(--ink-muted-48);
    padding: 12px 0;
    border-bottom: 1px solid var(--divider-soft);
  }

  .results-table td {
    padding: 16px 0;
    border-bottom: 1px solid var(--divider-soft);
  }

  .period-name {
    font-size: 15px;
    font-weight: 600;
  }

  .amount-main {
    font-size: 17px;
    font-weight: 600;
    text-align: right;
  }

  .amount-sub {
    font-size: 12px;
    color: var(--ink-muted-48);
    text-align: right;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="main-card">
  <h1 class="headline">자동 매수 시뮬레이션</h1>
  
  <div class="input-section">
    <div class="input-group">
      <div class="row-controls">
        <span class="label">투자 화폐 설정</span>
        <span class="period-name" id="currencyLabel">원화 (KRW)</span>
        <label class="switch">
          <input type="checkbox" id="currencyToggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="input-group">
      <span class="label">적용 환율 (1달러당)</span>
      <input type="number" id="exchangeRate" class="search-input" value="1350" step="1">
    </div>

    <div class="input-group">
      <span class="label">일일 투자 금액</span>
      <input type="number" id="dailyAmount" class="search-input" placeholder="금액 입력">
    </div>
  </div>

  <table class="results-table">
    <thead>
      <tr>
        <th>기간</th>
        <th style="text-align: right;">예상 합계</th>
      </tr>
    </thead>
    <tbody id="resultsBody">
    </tbody>
  </table>
</div>

<script>
  const periods = [
    { name: '1개월', days: 21 },
    { name: '6개월', days: 126 },
    { name: '1년', days: 252 },
    { name: '3년', days: 756 },
    { name: '5년', days: 1260 }
  ];

  const dailyInput = document.getElementById('dailyAmount');
  const rateInput = document.getElementById('exchangeRate');
  const currencyToggle = document.getElementById('currencyToggle');
  const currencyLabel = document.getElementById('currencyLabel');
  const resultsBody = document.getElementById('resultsBody');

  function formatWon(num) {
    const integerNum = Math.floor(num);
    if (integerNum < 10000) {
      return integerNum.toLocaleString() + "원";
    }
    
    const man = Math.floor(integerNum / 10000);
    const remainder = integerNum % 10000;
    
    if (remainder === 0) {
      return man.toLocaleString() + "만 원";
    }
    return man.toLocaleString() + "만 " + remainder.toLocaleString() + "원";
  }

  function handleToggleChange() {
    const daily = Number(dailyInput.value);
    const rate = Number(rateInput.value) || 1350;
    const isDollar = currencyToggle.checked;

    if (daily > 0) {
      if (isDollar) {
        dailyInput.value = (daily / rate).toFixed(2);
      } else {
        dailyInput.value = Math.floor(daily * rate);
      }
    }
    updateTable();
  }

  function updateTable() {
    const daily = Number(dailyInput.value) || 0;
    const rate = Number(rateInput.value) || 1350;
    const isDollar = currencyToggle.checked;
    
    currencyLabel.textContent = isDollar ? "달러 (USD)" : "원화 (KRW)";
    
    let html = '';
    periods.forEach(p => {
      const total = daily * p.days;
      let mainValue, subValue;

      if (isDollar) {
        mainValue = "$" + total.toLocaleString(undefined, {maximumFractionDigits: 2});
        subValue = "약 " + formatWon(total * rate);
      } else {
        mainValue = formatWon(total);
        subValue = "약 $" + (total / rate).toLocaleString(undefined, {maximumFractionDigits: 2});
      }

      html += `
        <tr>
          <td><div class="period-name">${p.name}</div><div class="label">${p.days}영업일</div></td>
          <td>
            <div class="amount-main">${mainValue}</div>
            <div class="amount-sub">${subValue}</div>
          </td>
        </tr>
      `;
    });
    resultsBody.innerHTML = html;
  }

  dailyInput.addEventListener('input', updateTable);
  rateInput.addEventListener('input', updateTable);
  currencyToggle.addEventListener('change', handleToggleChange);

  updateTable();
</script>

</body>
</html>
